<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription & Paiement</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: rgb(149, 194, 149);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding-top: 20px;
        font-size: 19px;
    }

    .main-title {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 20px;
        color: #003939;
    }

    .container {
        background: rgb(149, 194, 149);
        padding: 30px;
        width: 100%;
        max-width: 400px;
        border-radius: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        color: rgb(0, 57, 57);
        font-size: 22px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        padding: 10px 20px;
        background: #0070ba;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        white-space: nowrap;
    }

    button:hover {
        background: #005c99;
    }

    .switch {
        text-align: center;
        margin-top: 15px;
        cursor: pointer;
        color: #0070ba;
        font-size: 14px;
    }

    .hidden {
        display: none;
    }

    .mentions {
        font-size: 12px;
        text-align: center;
        color: #333;
        margin-bottom: 20px;
        width: 100%;
        max-width: 400px;
    }

    .line {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
    }

    .inline-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
    }

    /* Texte Se connecter */
    .login-text {
        text-align: center;
        font-size: 20px;
        color: #003939;
        font-weight: bold;
        margin-top: 25px;
        margin-bottom: 5px;
        cursor: pointer;
    }

    .login-text:hover {
        text-decoration: underline;
    }

    /* Flèche clignotante */
    .arrow {
        text-align: center;
        font-size: 30px;
        color: #003939;
        animation: blink 1s infinite;
        cursor: pointer;
        margin-bottom: 10px;
    }

    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
    }

    /* Logo Budokai cliquable */
    #logokyokushin {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        cursor: pointer;
    }

    #logokyokushin img {
        width: 60%;
        transition: transform 0.2s ease;
    }

    #logokyokushin:hover img {
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="main-title">Outil Karate Kyokushinkai</div>

<p class="mentions">
    En créant un compte, vous acceptez nos  
    <a href="legal-cgu.html" target="_blank">Conditions Générales d’Utilisation</a>.
</p>

<div class="container">

    <!-- INSCRIPTION -->
    <div id="signup">
        <h2>Inscription</h2>

        <input type="email" id="signup-email" placeholder="Email">
        <input type="password" id="signup-password" placeholder="Mot de passe">

        <!-- CGU -->
        <div class="line">
            <label class="inline-label">
                <input type="checkbox" id="accept-cgu">
                J’accepte les <a href="legal-cgu.html" target="_blank">CGU</a>
            </label>

            <button onclick="register()">S'inscrire</button>
        </div>
    </div>

    <!-- CONNEXION -->
    <div id="login" class="hidden">
        <h2>Connexion</h2>

        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Mot de passe">

        <button onclick="login()">Se connecter</button>

        <div class="switch" onclick="showSignup()">Créer un compte</div>
    </div>

    <!-- CGV + Payer -->
    <div class="line">
        <label class="inline-label">
            <input type="checkbox" id="accept-cgv">
            J’accepte les <a href="legal-cgv.html" target="_blank">CGV</a>
        </label>

        <button onclick="payer()">Payer 10 euros</button>
    </div>

    <div id="paypal-button-container" class="hidden"></div>

</div>

<!-- TEXTE SE CONNECTER -->
<div class="login-text" onclick="showLogin()">
    Se connecter
</div>

<!-- FLÈCHE CLIGNOTANTE -->
<div class="arrow" onclick="showLogin()">
    ↓
</div>

<!-- LOGO BUDOKAI CLIQUABLE -->
<div id="logokyokushin" onclick="showLogin()">
    <img src="world_kyokushin_budokai.png" alt="Connexion">
</div>

<script>
const API_URL = "http://localhost:5000/api/auth";

function showLogin() {
    document.getElementById("signup").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

function showSignup() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("signup").classList.remove("hidden");
}

async function register() {
    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;
    const acceptCGU = document.getElementById("accept-cgu").checked;

    if (!email || !password) {
        alert("Veuillez remplir tous les champs");
        return;
    }

    if (!acceptCGU) {
        alert("Vous devez accepter les Conditions Générales d’Utilisation pour continuer.");
        return;
    }

    try {
        const res = await fetch(`${API_URL}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        alert(data.message || "Inscription réussie !");
    } catch (error) {
        alert("Erreur lors de l'inscription");
    }
}

async function login() {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    if (!email || !password) {
        alert("Veuillez remplir tous les champs");
        return;
    }

    try {
        const res = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        alert(data.message || "Connexion réussie !");
    } catch (error) {
        alert("Erreur lors de la connexion");
    }
}

function payer() {
    const accept = document.getElementById("accept-cgv").checked;

    if (!accept) {
        alert("Vous devez accepter les Conditions Générales de Vente pour continuer.");
        return;
    }

    document.getElementById("paypal-button-container").classList.remove("hidden");
}
</script>

</body>
</html>
