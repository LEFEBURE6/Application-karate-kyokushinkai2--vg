<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: rgb(149, 194, 149);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding-top: 20px;
        font-size: 19px;
    }

    .main-title {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 20px;
        color: #003939;
    }

    .container {
        background: rgb(149, 194, 149);
        padding: 30px;
        width: 100%;
        max-width: 400px;
        border-radius: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        color: rgb(0, 57, 57);
        font-size: 22px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        padding: 10px 20px;
        background: #0070ba;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        white-space: nowrap;
    }

    button:hover {
        background: #005c99;
    }

    .inline-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
    }

    .login-text {
        text-align: center;
        font-size: 20px;
        color: #003939;
        font-weight: bold;
        margin-top: 25px;
        margin-bottom: 5px;
        cursor: pointer;
    }

    .login-text:hover {
        text-decoration: underline;
    }

    .arrow {
        text-align: center;
        font-size: 30px;
        color: #003939;
        animation: blink 1s infinite;
        cursor: pointer;
        margin-bottom: 10px;
    }

    @keyframes blink {
        0% { opacity: 1; }
        50% { opacity: 0; }
        100% { opacity: 1; }
    }

    #logokyokushin {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        cursor: pointer;
    }

    #logokyokushin img {
        width: 60%;
        transition: transform 0.2s ease;
    }

    #logokyokushin:hover img {
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="main-title">Outil Karate Kyokushinkai</div>

<div class="container">

    <h2>Inscription</h2>

    <input type="email" id="signup-email" placeholder="Email">
    <input type="password" id="signup-password" placeholder="Mot de passe">

    <label class="inline-label">
        <input type="checkbox" id="accept-cgu">
        J’accepte les <a href="legal-cgu.html" target="_blank">CGU</a>
    </label>

    <button onclick="register()">S'inscrire</button>

</div>

<!-- TEXTE SE CONNECTER -->
<div class="login-text" onclick="window.location.href='connexion.html'">
    Se connecter
</div>

<!-- FLÈCHE CLIGNOTANTE -->
<div class="arrow" onclick="window.location.href='connexion.html'">
    ↓
</div>

<!-- LOGO BUDOKAI CLIQUABLE → REDIRECTION VERS connexion.html -->
<div id="logokyokushin" onclick="window.location.href='connexion.html'">
    <img src="world_kyokushin_budokai.png" alt="Connexion">
</div>

<script>
const API_URL = "https://application-karate-kyokushinkai2.onrender.com/api/auth";

async function register() {
    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;
    const acceptCGU = document.getElementById("accept-cgu").checked;

    if (!email || !password) {
        alert("Veuillez remplir tous les champs.");
        return;
    }

    if (!acceptCGU) {
        alert("Vous devez accepter les CGU.");
        return;
    }

    try {
        const res = await fetch(`${API_URL}/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.message);
            return;
        }

        localStorage.setItem("token", data.token);

        alert("Inscription réussie !");
        window.location.href = "paiement.html";

    } catch (error) {
        alert("Erreur serveur.");
    }
}
</script>

</body>
</html>
