
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: rgb(149, 194, 149);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 40px;
            margin: 0;
            font-size: 19px;
        }

        #logo {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        #logo img {
            width: 43px;
            height: auto;
        }

        .container {
            background: rgb(149, 194, 149);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            text-align: center;
        }

        h2 {
            color: rgb(0, 57, 57);
            margin-bottom: 40px;
        }

        input {
            width: 70%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        #logokyokushin {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            text-align: center;
        }

        #logokyokushin img {
            width: 60%;
            transition: transform 0.2s ease;
        }

        #logokyokushin:hover img {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <!-- Petit logo en haut -->
    <div id="logo">
        <img src="kanji-kyokushin.webp" alt="logo">
    </div>

    <div class="container">
        <h2>Connexion</h2>

        <!-- Champs non obligatoires -->
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Mot de passe">
    </div>

    <!-- Logo Budokai = bouton de connexion -->
    <div id="logokyokushin" onclick="login()">
        <img src="world_kyokushin_budokai.png" alt="Connexion">
    </div>

<script>
function login() {
    // Redirection immédiate sans aucune vérification
    window.location.href = "interface.html";
}
</script>

</body>
</html>

<script>
const API_URL = "http://localhost:5000/api/auth/login"; 
// Mets ici l’URL de ton backend si tu es en hébergement

async function login() {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    if (!email || !password) {
        alert("Veuillez remplir tous les champs");
        return;
    }

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
            // Connexion réussie → redirection
            window.location.href = "interface.html";
        } else {
            alert(data.message || "Identifiants incorrects");
        }

    } catch (error) {
        alert("Erreur de connexion au serveur");
    }
}
</script>

</body>
