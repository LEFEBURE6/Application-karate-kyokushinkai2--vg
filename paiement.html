<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: rgb(149, 194, 149);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 40px;
            margin: 0;
            font-size: 19px;
        }

        #logo {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        #logo img {
            width: 43px;
            height: auto;
        }

        .container {
            background: rgb(149, 194, 149);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            text-align: center;
        }

        h2 {
            color: rgb(0, 57, 57);
            margin-bottom: 40px;
        }

        .inline-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        #logokyokushin {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            text-align: center;
        }

        #logokyokushin img {
            width: 60%;
            transition: transform 0.2s ease;
        }

        #logokyokushin:hover img {
            transform: scale(1.05);
        }

        #paypal-button-container {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <!-- Petit logo en haut -->
    <div id="logo">
        <img src="kanji-kyokushin.webp" alt="logo">
    </div>

    <div class="container">
        <h2>Paiement</h2>

        <label class="inline-label">
            <input type="checkbox" id="accept-cgv">
            J’accepte les <a href="legal-cgv.html" target="_blank">CGV</a>
        </label>

        <p>Montant : <strong>10 €</strong></p>
    </div>

    <!-- Logo Budokai = bouton pour afficher PayPal -->
    <div id="logokyokushin" onclick="showPayPal()">
        <img src="world_kyokushin_budokai.png" alt="Payer">
    </div>

    <div id="paypal-button-container" class="hidden"></div>

<script src="https://www.paypal.com/sdk/js?client-id=ton_client_id_paypal&currency=EUR"></script>

<script>
const API_URL = "http://localhost:5000/api/auth";

function showPayPal() {
    const accept = document.getElementById("accept-cgv").checked;

    if (!accept) {
        alert("Vous devez accepter les CGV pour continuer.");
        return;
    }

    document.getElementById("paypal-button-container").classList.remove("hidden");

    paypal.Buttons({
        createOrder: async function() {
            const token = localStorage.getItem("token");

            const res = await fetch(`${API_URL}/paypal/order`, {
                method: "POST",
                headers: { "Authorization": "Bearer " + token }
            });

            const data = await res.json();
            return data.id;
        },

        onApprove: async function(data) {
            const token = localStorage.getItem("token");

            const res = await fetch(`${API_URL}/paypal/capture`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ orderID: data.orderID })
            });

            const result = await res.json();

            if (result.message === "Paiement réussi") {
                alert("Paiement validé !");
                window.location.href = "interface.html";
            }
        }

    }).render("#paypal-button-container");
}
</script>

</body>
</html>
