<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: rgb(149, 194, 149);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 40px;
            margin: 0;
            font-size: 19px;
        }

        #logo {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        #logo img {
            width: 43px;
            height: auto;
        }

        .container {
            background: rgb(149, 194, 149);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            text-align: center;
        }

        h2 {
            color: rgb(0, 57, 57);
            margin-bottom: 40px;
        }

        .checkbox-group {
            text-align: left;
            margin-left: 15%;
            margin-bottom: 20px;
        }

        .checkbox-group label {
            display: block;
            margin-bottom: 10px;
            cursor: pointer;
        }

        #logokyokushin {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            text-align: center;
        }

        #logokyokushin img {
            width: 60%;
            transition: transform 0.2s ease;
        }

        #logokyokushin:hover img {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <!-- Petit logo en haut -->
    <div id="logo">
        <img src="kanji-kyokushin.webp" alt="logo">
    </div>

    <div class="container">
        <h2>Connexion</h2>

        <div class="checkbox-group">
            <label>
                <input type="checkbox" id="cgu">
                J’accepte les <a href="cgu.html" target="_blank">Conditions Générales d’Utilisation</a>
            </label>

            <label>
                <input type="checkbox" id="confidentialite">
                J’accepte la <a href="confidentialite.html" target="_blank">Politique de confidentialité</a>
            </label>
        </div>
    </div>

    <!-- Logo Budokai = bouton de connexion -->
    <div id="logokyokushin" onclick="login()">
        <img src="world_kyokushin_budokai.png" alt="Connexion">
    </div>

<script>
function login() {
    const cgu = document.getElementById("cgu").checked;
    const conf = document.getElementById("confidentialite").checked;

    if (!cgu || !conf) {
        alert("Vous devez accepter les deux conditions pour continuer.");
        return;
    }

    // Si les deux cases sont cochées → redirection
    window.location.href = "interface.html";
}
</script>

</body>
</html>
