<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: rgb(149, 194, 149);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding-top: 40px;
        font-size: 19px;
    }

    .container {
        background: rgb(149, 194, 149);
        padding: 30px;
        width: 100%;
        max-width: 400px;
        border-radius: 20px;
        text-align: center;
    }

    h2 {
        color: rgb(0, 57, 57);
        margin-bottom: 30px;
        font-size: 24px;
    }

    p {
        color: #003939;
        margin-bottom: 20px;
        font-size: 18px;
    }

    input {
        width: 80%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        padding: 10px 20px;
        background: #0070ba;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #005c99;
    }

    .back {
        margin-top: 20px;
        color: #003939;
        font-weight: bold;
        cursor: pointer;
        font-size: 18px;
    }

    .back:hover {
        text-decoration: underline;
    }

    #logokyokushin {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        cursor: pointer;
        text-align: center;
    }

    #logokyokushin img {
        width: 60%;
        transition: transform 0.2s ease;
    }

    #logokyokushin:hover img {
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="container">
    <h2>Mot de passe oublié</h2>

    <p>Entrez votre email pour recevoir un lien de réinitialisation.</p>

    <input type="email" id="reset-email" placeholder="Votre email">

    <button onclick="resetPassword()">Envoyer</button>

    <div class="back" onclick="window.location.href='connexion.html'">
        ← Retour à la connexion
    </div>
</div>

<div id="logokyokushin" onclick="window.location.href='connexion.html'">
    <img src="world_kyokushin_budokai.png" alt="Retour">
</div>

<script>
const API_URL = "https://application-karate-kyokushinkai2.onrender.com/api/auth";

async function resetPassword() {
    const email = document.getElementById("reset-email").value;

    if (!email) {
        alert("Veuillez entrer votre email.");
        return;
    }

    try {
        const res = await fetch(`${API_URL}/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        alert(data.message || "Si cet email existe, un lien a été envoyé.");

    } catch (error) {
        alert("Erreur serveur.");
    }
}
</script>

</body>
</html>
