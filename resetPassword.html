<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialisation du mot de passe</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: rgb(149, 194, 149);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding-top: 40px;
        font-size: 19px;
    }

    .container {
        background: rgb(149, 194, 149);
        padding: 30px;
        width: 100%;
        max-width: 400px;
        border-radius: 20px;
        text-align: center;
    }

    h2 {
        color: rgb(0, 57, 57);
        margin-bottom: 30px;
        font-size: 24px;
    }

    input {
        width: 80%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    button {
        padding: 10px 20px;
        background: #0070ba;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #005c99;
    }

    .back {
        margin-top: 20px;
        color: #003939;
        font-weight: bold;
        cursor: pointer;
        font-size: 18px;
    }

    .back:hover {
        text-decoration: underline;
    }

    #logokyokushin {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        cursor: pointer;
        text-align: center;
    }

    #logokyokushin img {
        width: 60%;
        transition: transform 0.2s ease;
    }

    #logokyokushin:hover img {
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="container">
    <h2>Nouveau mot de passe</h2>

    <input type="password" id="password" placeholder="Nouveau mot de passe">
    <input type="password" id="confirm" placeholder="Confirmer le mot de passe">

    <button onclick="resetPassword()">Réinitialiser</button>

    <div class="back" onclick="window.location.href='connexion.html'">
        ← Retour à la connexion
    </div>
</div>

<div id="logokyokushin" onclick="window.location.href='connexion.html'">
    <img src="world_kyokushin_budokai.png" alt="Retour">
</div>

<script>
const API_URL = "https://application-karate-kyokushinkai2.onrender.com/api/auth";

// Récupération du token dans l’URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get("token");

async function resetPassword() {
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (!password || !confirm) {
        alert("Veuillez remplir tous les champs.");
        return;
    }

    if (password !== confirm) {
        alert("Les mots de passe ne correspondent pas.");
        return;
    }

    try {
        const res = await fetch(`${API_URL}/reset-password/${token}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password })
        });

        const data = await res.json();

        alert(data.message);

        if (res.ok) {
            window.location.href = "connexion.html";
        }

    } catch (error) {
        alert("Erreur serveur.");
    }
}
</script>

</body>
</html>
